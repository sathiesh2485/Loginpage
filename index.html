<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLN College Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#0b1f45,#1746a2,#1f6feb);
}

/* Animated Background */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    top:-150px;
    left:-150px;
    filter:blur(10px);
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    bottom:-180px;
    right:-180px;
    filter:blur(10px);
}

.login-box{

    position:relative;
    z-index:10;

    width:390px;

    padding:35px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(15px);

    border-radius:20px;

    border:1px solid rgba(255,255,255,.3);

    box-shadow:0 15px 40px rgba(0,0,0,.3);

    text-align:center;
}

.logo{

    width:140px;
    margin-bottom:15px;
}

h2{
    color:white;
    margin-bottom:5px;
}

p{
    color:#ddd;
    margin-bottom:25px;
    font-size:15px;
}

.input-box{

    display:flex;
    align-items:center;

    background:white;

    padding:13px;

    border-radius:10px;

    margin-bottom:18px;
}

.input-box i{

    color:#1f6feb;
    margin-right:12px;
}

.input-box input{

    width:100%;

    border:none;

    outline:none;

    font-size:15px;
}

button{

    width:100%;

    padding:13px;

    border:none;

    border-radius:10px;

    background:#1f6feb;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:.3s;
}

button:hover{

    background:#0d5ad7;

    transform:translateY(-2px);
}

.footer{

    color:#ddd;

    margin-top:18px;

    font-size:13px;
}

@media(max-width:500px){

.login-box{

width:90%;

}

.logo{

width:120px;

}

}

</style>

</head>

<body>

<div class="login-box">

<img src="l1.png" class="logo" alt="KLN Logo">

<h2>KLN College of Engineering</h2>

<p>Cyber Security Portal</p>

<form id="loginForm">

<div class="input-box">
<i class="fas fa-user"></i>
<input type="text" id="username" placeholder="Username" required>
</div>

<div class="input-box">
<i class="fas fa-lock"></i>
<input type="password" id="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

<div class="footer">
© 2026 KLN College of Engineering
</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let username=document.getElementById("username").value.trim();
let password=document.getElementById("password").value.trim();

if(username=="" || password=="")
{
alert("Please enter Username and Password.");
return;
}

alert("Login Successful!");

});

</script>

</body>
</html>
